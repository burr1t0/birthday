<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐱 Тебя ждёт сюрприз!</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── Background cats layer ── */
    #bg-cats {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-wrap {
      position: absolute;
      transform: translate(-50%, -50%);
    }
    .bg-inner { display: block; }

    /* ── Entry card ── */
    .entry-wrap {
      position: relative;
      z-index: 10;
      width: min(480px, 92vw);
      animation: fadeInUp 0.65s ease both;
    }

    .entry-card {
      background: white;
      border: 3.5px solid var(--p2);
      border-radius: var(--r-xl);
      box-shadow: var(--s3), 0 0 0 10px rgba(255,179,209,0.18);
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
    }

    .hero-cat {
      display: flex;
      justify-content: center;
      margin-bottom: 1.1rem;
      animation: popIn 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s both;
    }

    .entry-title {
      font-size: clamp(1.9rem, 5vw, 2.5rem);
      color: var(--p4);
      margin-bottom: 0.35rem;
    }

    .entry-sub {
      color: var(--text-mid);
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 2rem;
    }

    /* ── Input ── */
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .code-input {
      width: 100%;
      border: 3px solid var(--p2);
      border-radius: var(--pill);
      padding: 1rem 1.8rem;
      font-size: 1.3rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      color: var(--text);
      background: var(--bg);
      outline: none;
      text-align: center;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .code-input::placeholder {
      color: var(--text-light);
      letter-spacing: 0;
      text-transform: none;
      font-weight: 600;
    }
    .code-input:focus {
      border-color: var(--p4);
      background: white;
      box-shadow: 0 0 0 5px rgba(255,77,141,0.14);
    }
    .code-input.shake {
      animation: shake 0.5s ease;
      border-color: #FF4444;
    }

    /* ── Error ── */
    .err-msg {
      margin-top: 0.6rem;
      color: #E53935;
      font-weight: 800;
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }
    .err-msg.show { opacity: 1; transform: translateY(0); }

    /* ── Shame overlay ── */
    #shame {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 1rem;
    }
    #shame.show { display: flex; animation: fadeInUp 0.4s ease both; }
    .shame-card {
      background: white;
      border: 3.5px solid var(--p2);
      border-radius: var(--r-xl);
      box-shadow: var(--s3);
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 100%;
    }
    .shame-card p {
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      color: var(--text);
      margin: 1rem 0 1.5rem;
      line-height: 1.5;
    }

    /* ── Success overlay ── */
    #success {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, #FFD6E8 0%, #FF85A1 100%);
      z-index: 100;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    #success.show {
      display: flex;
      animation: successFlash 1s ease forwards;
    }
    #success p {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: white;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>
  <div id="bg-cats"></div>

  <div class="entry-wrap">
    <div class="entry-card">
      <div class="hero-cat" id="heroCat"></div>
      <h1 class="entry-title">Псс… это для тебя!</h1>
      <p class="entry-sub">Введи свой секретный код 🎀</p>

      <div class="input-group">
        <input
          type="text"
          id="codeInput"
          class="code-input"
          placeholder="твой код…"
          maxlength="20"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          onkeydown="if(event.key==='Enter') check()"
        >
        <button class="btn" onclick="check()">Открыть ✨</button>
      </div>

      <p class="err-msg" id="err">Неверный код 🐾 попробуй ещё раз</p>
    </div>
  </div>

  <div id="shame">
    <div class="shame-card">
      <div id="shameCat"></div>
      <p>ну что ты… даже с этим не справился 😔</p>
      <button class="btn" onclick="closeShame()">попробовать ещё раз</button>
    </div>
  </div>

  <div id="success">
    <div id="successCat"></div>
    <p>Открываю приглашение…</p>
  </div>

  <script src="guests.js"></script>
  <script src="cats.js"></script>
  <script>
    // ── Hero cat ───────────────────────────────
    document.getElementById('heroCat').innerHTML = CAT_VARIANTS[0](108);

    // ── Броуновское движение котиков 🐱 ───────────
    (function initCats() {
      const bg = document.getElementById('bg-cats');
      const CAT_COUNT = 27;
      const cats = [];

      for (let i = 0; i < CAT_COUNT; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'bg-wrap';

        const size    = 52 + Math.random() * 48;
        const variant = i % CAT_VARIANTS.length;
        const rot     = (Math.random() - 0.5) * 30;
        wrap.innerHTML = `<div style="transform:rotate(${rot}deg)">${CAT_VARIANTS[variant](size)}</div>`;
        wrap.style.opacity = '0.72';
        bg.appendChild(wrap);

        const angle = Math.random() * Math.PI * 2;
        const speed = 0.25 + Math.random() * 0.35;
        const r     = size * 0.42;
        const x     = r + Math.random() * (window.innerWidth  - r * 2);
        const y     = r + Math.random() * (window.innerHeight - r * 2);

        cats.push({ el: wrap, x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, r });
        wrap.style.left = x + 'px';
        wrap.style.top  = y + 'px';
      }

      function tick() {
        const W = window.innerWidth;
        const H = window.innerHeight;

        for (const c of cats) {
          c.x += c.vx;
          c.y += c.vy;
          if (c.x - c.r < 0)  { c.x = c.r;     c.vx =  Math.abs(c.vx); }
          if (c.x + c.r > W)  { c.x = W - c.r; c.vx = -Math.abs(c.vx); }
          if (c.y - c.r < 0)  { c.y = c.r;     c.vy =  Math.abs(c.vy); }
          if (c.y + c.r > H)  { c.y = H - c.r; c.vy = -Math.abs(c.vy); }
        }

        for (let i = 0; i < cats.length; i++) {
          for (let j = i + 1; j < cats.length; j++) {
            const a = cats[i], b = cats[j];
            const dx = b.x - a.x, dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const min  = a.r + b.r;
            if (dist < min && dist > 0) {
              const nx = dx / dist, ny = dy / dist;
              const overlap = (min - dist) / 2;
              a.x -= nx * overlap; a.y -= ny * overlap;
              b.x += nx * overlap; b.y += ny * overlap;
              const dot = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
              if (dot > 0) {
                a.vx -= dot * nx; a.vy -= dot * ny;
                b.vx += dot * nx; b.vy += dot * ny;
              }
            }
          }
        }

        for (const c of cats) {
          c.el.style.left = c.x + 'px';
          c.el.style.top  = c.y + 'px';
        }

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    })();

    // ── Проверка кода ──────────────────────────
    let failCount  = 0;
    let shameShown = false;

    function check() {
      const code  = document.getElementById('codeInput').value.trim().toUpperCase();
      const input = document.getElementById('codeInput');
      const err   = document.getElementById('err');

      if (GUESTS[code]) {
        sessionStorage.setItem('bday_guest', code);
        const overlay = document.getElementById('success');
        document.getElementById('successCat').innerHTML = CAT_VARIANTS[1](90);
        overlay.classList.add('show');
        setTimeout(() => { window.location.href = 'invite.html'; }, 950);
      } else {
        failCount++;
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        err.classList.add('show');
        setTimeout(() => {
          input.classList.remove('shake');
          err.classList.remove('show');
        }, 2400);

        if (failCount >= 3 && !shameShown) {
          shameShown = true;
          setTimeout(() => {
            document.getElementById('shameCat').innerHTML = CAT_VARIANTS[4](90);
            document.getElementById('shame').classList.add('show');
          }, 600);
        }
      }
    }

    function closeShame() {
      document.getElementById('shame').classList.remove('show');
      document.getElementById('codeInput').focus();
    }
  </script>
</body>
</html>
